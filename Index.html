<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Calculator</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    font-family:Arial, sans-serif;
}

.calculator{
    background:#111;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
    width:300px;
}

.display{
    width:100%;
    height:60px;
    background:#222;
    color:#fff;
    text-align:right;
    padding:15px;
    font-size:1.5rem;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    padding:15px;
    font-size:1.1rem;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#333;
    color:white;
}

.operator{
    background:#ff9500;
    color:white;
}

.equal{
    background:#28a745;
    color:white;
    grid-column:span 2;
}

.clear{
    background:#dc3545;
    color:white;
}

.del{
    background:#6c757d;
    color:white;
}
</style>
</head>

<body>

<div class="calculator">
    <input type="text" class="display" id="display" disabled>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="del" onclick="deleteLast()">DEL</button>
        <button class="operator" onclick="append('%')">%</button>
        <button class="operator" onclick="append('/')">/</button>

        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('*')">*</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="operator" onclick="append('-')">-</button>

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="number" onclick="append('0')">0</button>
        <button class="number" onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
let display = document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function deleteLast(){
    display.value = display.value.slice(0, -1);
}

function calculate(){
    try{
        display.value = new Function("return " + display.value)();
    } catch{
        display.value = "Error";
    }
}
</script>

</body>
</html>
